<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #111;
      color: #d0d0d0;
      min-height: 100vh;
    }

    /* --- Menu --- */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 1001;
      background: #1c1c1c;
      transition: background 0.3s ease, backdrop-filter 0.3s ease;
    }

    .topbar.scrolled {
      background: rgba(28, 28, 28, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .topbar-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #f0f0f0;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60%;
    }

    .menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      color: #fff;
      line-height: 1;
      transition: opacity 0.25s ease;
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .menu-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .menu-overlay nav ul {
      list-style: none;
      text-align: center;
    }

    .menu-overlay nav ul li {
      margin: 24px 0;
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .menu-overlay.open nav ul li:nth-child(1) { opacity: 1; transform: translateY(0); transition-delay: 0.08s; }
    .menu-overlay.open nav ul li:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.18s; }
    .menu-overlay.open nav ul li:nth-child(3) { opacity: 1; transform: translateY(0); transition-delay: 0.28s; }
    .menu-overlay.open nav ul li:nth-child(4) { opacity: 1; transform: translateY(0); transition-delay: 0.38s; }

    .menu-overlay nav ul li a {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f0f0f0;
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .menu-overlay nav ul li a:hover {
      text-decoration: underline;
    }

    /* --- Page --- */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 110px 24px 120px;
    }

    header {
      text-align: center;
      margin-bottom: 64px;
      padding-bottom: 40px;
      border-bottom: 1px solid #252525;
    }

    header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #f0f0f0;
    }

    /* --- Project entries --- */
    .project-entry {
      display: block;
      padding: 36px 0;
      border-bottom: 1px solid #222;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .project-entry:first-of-type {
      padding-top: 0;
    }

    .project-entry:hover .entry-title {
      text-decoration: underline;
      text-decoration-color: #aaa;
    }

    .entry-date {
      font-size: 0.8rem;
      color: #bbb;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .entry-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f0f0f0;
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .entry-excerpt-wrap {
      position: relative;
      max-height: 80px;
      overflow: hidden;
    }

    .entry-excerpt-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(transparent, #111);
    }

    .entry-excerpt {
      font-size: 1rem;
      line-height: 1.75;
      color: #999;
    }

    .read-more {
      display: inline-block;
      margin-top: 14px;
      font-size: 0.85rem;
      color: #aaa;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    @media (max-width: 600px) {
      .page {
        padding: 80px 16px 80px;
      }

      header h1 {
        font-size: 1.8rem;
      }

      .entry-title {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>

  <nav class="topbar" aria-label="Site navigation">
    <button type="button" class="menu-btn" id="menuBtn" onclick="toggleMenu()" aria-label="Toggle menu">☰</button>
    <span class="topbar-title">Projects</span>
  </nav>

  <div class="menu-overlay" id="menuOverlay">
    <nav aria-label="Menu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="decision-making.html">Decision Making</a></li>
        <li><a href="neuroscience.html">Neuroscience</a></li>
        <li><a href="projects.html">Projects</a></li>
      </ul>
    </nav>
  </div>

  <div class="page">
    <!-- Project entry template — duplicate this block for each project -->
    <a class="project-entry" href="projects/firefly.html">
      <span class="entry-date">June 1, 2026</span>
      <h2 class="entry-title">Firefly</h2>
      <div class="entry-excerpt-wrap">
        <p class="entry-excerpt">
          Firefly is a social media app for those who miss the golden era of social networks. Find friends, build communities, and carve your own corner of the internet.
        </p>
      </div>
      <span class="read-more">Read more →</span>
    </a>

  </div>

  <script>
    let menuOpen = false;

    function toggleMenu() {
      const overlay = document.getElementById('menuOverlay');
      const btn = document.getElementById('menuBtn');
      menuOpen = overlay.classList.toggle('open');
      btn.textContent = menuOpen ? '✕' : '☰';
    }

    let lastScrollY = 0;
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('.topbar');
      const btn = document.getElementById('menuBtn');
      const y = window.scrollY;

      nav.classList.toggle('scrolled', y > 20);

      if (!menuOpen) {
        if (y > lastScrollY && y > 40) {
          btn.style.opacity = '0';
          btn.style.pointerEvents = 'none';
        } else {
          btn.style.opacity = '1';
          btn.style.pointerEvents = 'auto';
        }
      }
      lastScrollY = y;
    });
  </script>

</body>
</html>
