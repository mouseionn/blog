<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firefly</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #111;
      color: #d0d0d0;
      min-height: 100vh;
    }

    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 1001;
      background: #1c1c1c;
      transition: background 0.3s ease, backdrop-filter 0.3s ease;
    }

    .topbar.scrolled {
      background: rgba(28, 28, 28, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .topbar-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #f0f0f0;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60%;
    }

    .menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      color: #fff;
      line-height: 1;
      transition: opacity 0.25s ease;
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .menu-overlay.open { opacity: 1; pointer-events: all; }

    .menu-overlay nav ul { list-style: none; text-align: center; }

    .menu-overlay nav ul li {
      margin: 24px 0;
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .menu-overlay.open nav ul li:nth-child(1) { opacity: 1; transform: translateY(0); transition-delay: 0.08s; }
    .menu-overlay.open nav ul li:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.18s; }
    .menu-overlay.open nav ul li:nth-child(3) { opacity: 1; transform: translateY(0); transition-delay: 0.28s; }
    .menu-overlay.open nav ul li:nth-child(4) { opacity: 1; transform: translateY(0); transition-delay: 0.38s; }

    .menu-overlay nav ul li a {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f0f0f0;
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .menu-overlay nav ul li a:hover { text-decoration: underline; }

    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 132px 24px 120px;
    }

    header {
      text-align: center;
      margin-bottom: 64px;
      padding-bottom: 40px;
      border-bottom: 1px solid #252525;
    }

    header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #f0f0f0;
    }

    .post-meta {
      font-size: 0.85rem;
      color: #777;
      margin-bottom: 32px;
    }

    .post a {
      color: #d0d0d0;
      text-decoration: underline;
    }

    .post p {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #c0c0c0;
      margin-top: 20px;
    }

    .post p:first-of-type {
      margin-top: 0;
    }

    @media (max-width: 600px) {
      .page { padding: 88px 16px 80px; }
      header h1 { font-size: 1.8rem; }
      .post p { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <nav class="topbar" aria-label="Site navigation">
    <button type="button" class="menu-btn" id="menuBtn" onclick="toggleMenu()" aria-label="Toggle menu">☰</button>
    <span class="topbar-title">Firefly</span>
  </nav>

  <div class="menu-overlay" id="menuOverlay">
    <nav aria-label="Menu">
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../decision-making.html">Decision Making</a></li>
        <li><a href="../neuroscience.html">Neuroscience</a></li>
        <li><a href="../projects.html">Projects</a></li>
      </ul>
    </nav>
  </div>

  <div class="page">
    <article class="post">
      <p class="post-meta">June 1, 2026</p>

      <p>
        Firefly is a social media app for those who miss the golden era of social networks.
        Find friends, build communities, and carve your own corner of the internet.
      </p>
    </article>
  </div>

  <script>
    let menuOpen = false;

    function toggleMenu() {
      const overlay = document.getElementById('menuOverlay');
      const btn = document.getElementById('menuBtn');
      menuOpen = overlay.classList.toggle('open');
      btn.textContent = menuOpen ? '✕' : '☰';
    }

    let lastScrollY = 0;
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('.topbar');
      const btn = document.getElementById('menuBtn');
      const y = window.scrollY;

      nav.classList.toggle('scrolled', y > 20);

      if (!menuOpen) {
        if (y > lastScrollY && y > 40) {
          btn.style.opacity = '0';
          btn.style.pointerEvents = 'none';
        } else {
          btn.style.opacity = '1';
          btn.style.pointerEvents = 'auto';
        }
      }
      lastScrollY = y;
    });
  </script>

</body>
</html>
