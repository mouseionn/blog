<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mouseionn</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #111;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 1001;
    }

    .menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      color: #fff;
      line-height: 1;
      transition: opacity 0.25s ease;
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .menu-overlay.open { opacity: 1; pointer-events: all; }

    .menu-overlay nav ul { list-style: none; text-align: center; }

    .menu-overlay nav ul li {
      margin: 24px 0;
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .menu-overlay.open nav ul li:nth-child(1) { opacity: 1; transform: translateY(0); transition-delay: 0.08s; }
    .menu-overlay.open nav ul li:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.18s; }
    .menu-overlay.open nav ul li:nth-child(3) { opacity: 1; transform: translateY(0); transition-delay: 0.28s; }
    .menu-overlay.open nav ul li:nth-child(4) { opacity: 1; transform: translateY(0); transition-delay: 0.38s; }

    .menu-overlay nav ul li a {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .menu-overlay nav ul li a:hover { text-decoration: underline; }

    .hero {
      text-align: center;
      padding: 96px 24px 12px;
      flex-shrink: 0;
    }

    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    canvas {
      display: block;
      flex: 1;
      width: 100%;
      cursor: default;
    }
  </style>
</head>
<body>

  <nav class="topbar" aria-label="Site navigation">
    <button type="button" class="menu-btn" id="menuBtn" onclick="toggleMenu()" aria-label="Toggle menu">☰</button>
  </nav>

  <div class="menu-overlay" id="menuOverlay">
    <nav aria-label="Menu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="decision-making.html">Decision Making</a></li>
        <li><a href="neuroscience.html">Neuroscience</a></li>
        <li><a href="projects.html">Projects</a></li>
      </ul>
    </nav>
  </div>

  <div class="hero">
    <h1>mouseionn</h1>
  </div>

  <canvas id="globe"></canvas>

  <script>
    function toggleMenu() {
      const overlay = document.getElementById('menuOverlay');
      const btn = document.getElementById('menuBtn');
      const isOpen = overlay.classList.toggle('open');
      btn.textContent = isOpen ? '✕' : '☰';
    }

    // ── 3D Globe ───────────────────────────────────────────────────
    const canvas = document.getElementById('globe');
    const ctx = canvas.getContext('2d');

    let logW = 0, logH = 0, R = 0; // logical px dims and sphere radius

    // phi = polar angle from north pole (0=top, π=bottom)
    // theta = azimuthal angle (0=+X, π/2=+Z front, π=-X, 3π/2=-Z back)
    const nodes = [
      { lines: ['Decision', 'Making'], url: 'decision-making.html',  phi: 0.85, theta: 0.3,  related: [1] },
      { lines: ['Neuroscience'],       url: 'neuroscience.html',     phi: 0.95, theta: 1.4,  related: [0] },
      { lines: ['Projects'],           url: 'projects.html',          phi: 1.55, theta: 3.2,  related: [3] },
      { lines: ['Firefly'],            url: 'projects/firefly.html',  phi: 1.75, theta: 3.55, related: [2] }
    ];

    // Unique edges from related lists
    const edges = [];
    nodes.forEach((n, i) => n.related.forEach(j => { if (j > i) edges.push([i, j]); }));

    // Rotation state
    let rotY = 0, rotX = 0.15;
    let isDragging = false;
    let prevMX = 0, prevMY = 0;
    let momX = 0, momY = 0;
    let dragStartX = 0, dragStartY = 0;
    const AUTO = 0.0025;
    const DECAY = 0.91;

    // ── Geometry helpers ──
    function cart(phi, theta) {
      return {
        x: Math.sin(phi) * Math.cos(theta),
        y: Math.cos(phi),
        z: Math.sin(phi) * Math.sin(theta)
      };
    }

    function rot(p) {
      // Y rotation (spin)
      const x1 = Math.cos(rotY) * p.x + Math.sin(rotY) * p.z;
      const z1 = -Math.sin(rotY) * p.x + Math.cos(rotY) * p.z;
      // X rotation (tilt)
      const y2 = Math.cos(rotX) * p.y - Math.sin(rotX) * z1;
      const z2 = Math.sin(rotX) * p.y + Math.cos(rotX) * z1;
      return { x: x1, y: y2, z: z2 };
    }

    function proj(p) {
      const f = R * 2.8;
      const s = f / (f + p.z * R);
      return { sx: logW / 2 + p.x * R * s, sy: logH / 2 + p.y * R * s, s, depth: p.z };
    }

    function getProjected() {
      return nodes.map(n => proj(rot(cart(n.phi, n.theta))));
    }

    // ── Drawing ──
    function drawRecBox(sx, sy, lines, fontSize, alpha) {
      ctx.font = `${fontSize}px Georgia, serif`;
      const lineH = fontSize * 1.35;
      const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));
      const pad = 6;
      const bw = maxW + pad * 2;
      const bh = lines.length * lineH + pad * 2;
      const bx = sx - bw / 2;
      const by = sy - bh / 2;
      const cl = Math.min(9, bw * 0.28); // corner line length

      ctx.strokeStyle = `rgba(255,255,255,${(alpha * 0.6).toFixed(2)})`;
      ctx.lineWidth = 1;

      // Four corner brackets
      [
        [bx,      by,      1,  1 ],
        [bx + bw, by,     -1,  1 ],
        [bx,      by + bh, 1, -1 ],
        [bx + bw, by + bh,-1, -1 ]
      ].forEach(([x, y, dx, dy]) => {
        ctx.beginPath();
        ctx.moveTo(x + dx * cl, y);
        ctx.lineTo(x, y);
        ctx.lineTo(x, y + dy * cl);
        ctx.stroke();
      });

      // Text
      ctx.fillStyle = `rgba(255,255,255,${(alpha * 0.9).toFixed(2)})`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const startY = sy - ((lines.length - 1) * lineH) / 2;
      lines.forEach((line, i) => ctx.fillText(line, sx, startY + i * lineH));
    }

    function draw() {
      ctx.clearRect(0, 0, logW, logH);

      // Faint sphere outline
      ctx.beginPath();
      ctx.arc(logW / 2, logH / 2, R, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      ctx.stroke();

      const projected = getProjected();

      // Edges
      edges.forEach(([i, j]) => {
        const a = projected[i], b = projected[j];
        const alpha = Math.max(0.04, ((a.depth + b.depth) / 2 + 1) / 2 * 0.4);
        ctx.beginPath();
        ctx.moveTo(a.sx, a.sy);
        ctx.lineTo(b.sx, b.sy);
        ctx.strokeStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
        ctx.lineWidth = 0.75;
        ctx.stroke();
      });

      // Nodes — draw back to front so front nodes are on top
      [...projected.keys()]
        .sort((a, b) => projected[a].depth - projected[b].depth)
        .forEach(i => {
          const { sx, sy, s, depth } = projected[i];
          const nodeAlpha = Math.max(0.08, (depth + 1) / 2 * 0.75 + 0.1);

          // Node dot
          ctx.beginPath();
          ctx.arc(sx, sy, Math.max(2, 3 * s), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${nodeAlpha.toFixed(2)})`;
          ctx.fill();

          // Recognition-box label (front hemisphere only, fade with depth)
          if (depth > -0.25) {
            const labelAlpha = Math.min(1, (depth + 0.25) / 0.75) * nodeAlpha;
            const fontSize = Math.max(9, Math.round(11 * s));
            const labelY = sy + Math.max(16, 24 * s);
            drawRecBox(sx, labelY, nodes[i].lines, fontSize, labelAlpha);
          }
        });
    }

    // ── Animation loop ──
    function step() {
      if (!isDragging) {
        rotY += AUTO + momY;
        rotX += momX;
        rotX = Math.max(-Math.PI * 0.42, Math.min(Math.PI * 0.42, rotX));
        momX *= DECAY;
        momY *= DECAY;
      }
      draw();
      requestAnimationFrame(step);
    }

    // ── Input ──
    function clientXY(e) {
      const src = e.touches ? e.touches[0] : e;
      return [src.clientX, src.clientY];
    }

    function releaseXY(e) {
      if (e.changedTouches) return [e.changedTouches[0].clientX, e.changedTouches[0].clientY];
      return [e.clientX, e.clientY];
    }

    function hitNode(mx, my) {
      const projected = getProjected();
      for (let i = projected.length - 1; i >= 0; i--) {
        const { sx, sy, depth } = projected[i];
        if (depth > -0.5 && Math.hypot(mx - sx, my - sy) < 26) return i;
      }
      return -1;
    }

    function onDown(e) {
      [prevMX, prevMY] = clientXY(e);
      [dragStartX, dragStartY] = [prevMX, prevMY];
      isDragging = true;
      momX = 0; momY = 0;
    }

    function onMove(e) {
      if (!isDragging) {
        if (e.touches) return;
        canvas.style.cursor = hitNode(e.clientX, e.clientY) >= 0 ? 'pointer' : 'default';
        return;
      }
      const [mx, my] = clientXY(e);
      const dx = (mx - prevMX) * 0.007;
      const dy = (my - prevMY) * 0.007;
      rotY += dx; rotX += dy;
      rotX = Math.max(-Math.PI * 0.42, Math.min(Math.PI * 0.42, rotX));
      momY = dx; momX = dy;
      prevMX = mx; prevMY = my;
    }

    function onUp(e) {
      if (!isDragging) return;
      isDragging = false;
      const [ux, uy] = releaseXY(e);
      if (Math.hypot(ux - dragStartX, uy - dragStartY) < 6) {
        const rect = canvas.getBoundingClientRect();
        const i = hitNode(ux - rect.left + rect.left, uy); // canvas is full-width so no offset needed
        if (i >= 0) window.location.href = nodes[i].url;
      }
    }

    canvas.addEventListener('mousedown', onDown);
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseup', onUp);
    canvas.addEventListener('mouseleave', () => { isDragging = false; });

    canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e); }, { passive: false });
    canvas.addEventListener('touchend',   e => { e.preventDefault(); onUp(e);   }, { passive: false });

    // ── Resize ──
    function resize() {
      const dpr = window.devicePixelRatio || 1;
      logW = canvas.offsetWidth;
      logH = canvas.offsetHeight;
      canvas.width = Math.round(logW * dpr);
      canvas.height = Math.round(logH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      R = Math.min(logW, logH) * 0.28;
    }

    window.addEventListener('resize', resize);
    resize();
    step();
  </script>

</body>
</html>
