<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #fafaf8;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- Menu --- */
    .menu-btn {
      position: fixed;
      top: 22px;
      left: 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      color: #111;
      z-index: 1001;
      line-height: 1;
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: #fafaf8;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .menu-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .menu-overlay nav ul {
      list-style: none;
      text-align: center;
    }

    .menu-overlay nav ul li {
      margin: 24px 0;
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .menu-overlay.open nav ul li:nth-child(1) { opacity: 1; transform: translateY(0); transition-delay: 0.08s; }
    .menu-overlay.open nav ul li:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.18s; }

    .menu-overlay nav ul li a {
      font-size: 1.8rem;
      font-weight: 700;
      color: #111;
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .menu-overlay nav ul li a:hover {
      text-decoration: underline;
    }

    /* --- Hero --- */
    .hero {
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: #111;
    }

    .hero p {
      margin-top: 16px;
      font-size: 1rem;
      color: #888;
      font-style: italic;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <button type="button" class="menu-btn" onclick="toggleMenu()" aria-label="Toggle menu">☰</button>

  <div class="menu-overlay" id="menuOverlay">
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="decision-making.html">Decision Making</a></li>
      </ul>
    </nav>
  </div>

  <div class="hero">
    <h1>mouseionn</h1>
    <p></p>
  </div>

  <script>
    function toggleMenu() {
      const overlay = document.getElementById('menuOverlay');
      const btn = document.querySelector('.menu-btn');
      const isOpen = overlay.classList.toggle('open');
      btn.textContent = isOpen ? '✕' : '☰';
    }
  </script>

</body>
</html>
